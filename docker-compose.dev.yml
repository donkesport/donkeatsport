services:
  app:
    build:
      target: development
    env_file:
      - ./secrets/.env.dev
    volumes:
      - ./src/donkeatsport:/var/www/donkeatsport

  nginx:
    ports:
      - "8000:80"
    volumes:
      - ./src/donkeatsport:/var/www/donkeatsport
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost/up || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 10s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravel-phpmyadmin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    environment:
      PMA_HOST: db
    networks:
      - laravel-network
  
  reverb:
    env_file:
      - ./secrets/.env.dev
    volumes:
      - ./src/donkeatsport:/var/www/donkeatsport
    ports:
      - "8081:8081"