services:
  app:
    build:
      target: production
    env_file:
      - ./secrets/.env.prod
    volumes:
      - static-content:/var/www/donkeatsport/public

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static-content:/var/www/donkeatsport/public:ro
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/certs/selfsigned.crt:/etc/nginx/certs/selfsigned.crt:ro
      - ./docker/nginx/certs/selfsigned.key:/etc/nginx/certs/selfsigned.key:ro
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost/up || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 10s
    depends_on:
      - app
  
  reverb:
    env_file:
      - ./secrets/.env.prod
    volumes:
      - static-content:/var/www/donkeatsport/public

volumes:
  static-content: